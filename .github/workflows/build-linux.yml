name: Build Linux

on:
  workflow_call: {}
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - name: Build Linux
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          flutter build linux --release --build-name="$VERSION" --build-number=${{ github.run_number }}
      # cd into the bundle folder before zipping, same fix as macOS.
      - name: Zip Linux build
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/laststats-linux.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-linux
          path: laststats-linux.zip
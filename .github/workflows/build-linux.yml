name: Build Linux

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (e.g. 2.7.0). Empty = read from pubspec.yaml'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.7.0). Empty = read from pubspec.yaml'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++6 \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-libav
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons

      - name: Resolve version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build Linux
        run: flutter build linux --release --build-name="$VERSION" --build-number=${{ github.run_number }}

      - name: Zip Linux build
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/laststats-linux.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-linux
          path: laststats-linux.zip
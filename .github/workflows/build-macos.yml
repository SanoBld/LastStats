name: Build macOS

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (e.g. 2.7.0). Empty = read from pubspec.yaml'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.7.0). Empty = read from pubspec.yaml'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons

      - name: Resolve version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build macOS
        run: flutter build macos --release --build-name="$VERSION" --build-number=${{ github.run_number }}

      # cd into the actual app folder first, so the zip does not
      # contain the long "build/macos/Build/Products/Release/" path inside it.
      - name: Zip macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/laststats-macos.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-macos
          path: laststats-macos.zip
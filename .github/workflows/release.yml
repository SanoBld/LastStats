name: Build APK and publish update metadata

# Runs every time you publish a GitHub Release (stable OR pre-release)
on:
  release:
    types: [published]

permissions:
  contents: write   # needed to attach the APK and push to gh-pages

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build the release APK
        run: flutter build apk --release

      # Attach the APK file directly to the GitHub Release (no separate repo, no PAT)
      - name: Upload APK to the release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Decide the metadata filename: stable releases -> update.json, pre-releases -> update_beta.json
      - name: Pick metadata filename
        id: meta
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "filename=update_beta.json" >> "$GITHUB_OUTPUT"
          else
            echo "filename=update.json" >> "$GITHUB_OUTPUT"
          fi

      # Build the JSON file the app will read. apk_url is predictable because
      # softprops always names the attached asset the same way.
      - name: Write the metadata JSON file
        run: |
          mkdir -p public
          cat > public/${{ steps.meta.outputs.filename }} << EOF
          {
            "tag": "${{ github.event.release.tag_name }}",
            "version": "${{ github.event.release.tag_name }}",
            "apk_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/app-release.apk",
            "release_url": "${{ github.event.release.html_url }}",
            "notes": $(jq -Rs . <<< "${{ github.event.release.body }}"),
            "published_at": "${{ github.event.release.published_at }}",
            "prerelease": ${{ github.event.release.prerelease }}
          }
          EOF

      # Push only this one file to gh-pages, keep everything else already there
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true   # don't wipe the other channel's json file
name: Release LastStats

# Two ways to trigger a real release:
#  1) Push a tag like v2.7.0 (or v2.7.0-beta for a pre-release)
#  2) Run this workflow manually from the Actions tab (workflow_dispatch)
on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release? (beta, rc...)'
        type: boolean
        required: false
        default: false
      version:
        description: 'Version to release (e.g. 2.0.1)'
        required: true

jobs:
  # Each platform builds in its own separate workflow file.
  windows:
    uses: ./.github/workflows/build-windows.yml

  macos:
    uses: ./.github/workflows/build-macos.yml

  linux:
    uses: ./.github/workflows/build-linux.yml

  android:
    uses: ./.github/workflows/build-android.yml

  # Once all 4 builds are done, gather everything and publish the release.
  publish-release:
    needs: [ windows, macos, linux, android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag, version and prerelease flag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}"    >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            if [[ "${{ inputs.version }}" == *"-"* ]] || [ "${{ inputs.prerelease }}" = "true" ]; then
              echo "prerelease=true"  >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
            echo "tag=$TAG"     >> $GITHUB_OUTPUT
            echo "version=$VER" >> $GITHUB_OUTPUT
            if [[ "$TAG" == *"-"* ]]; then
              echo "prerelease=true"  >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.meta.outputs.tag }} || true
          git push origin ${{ steps.meta.outputs.tag }} || true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      # download-artifact creates one subfolder per artifact name.
      # We flatten everything into one folder so the release page shows
      # a clean flat file list.
      - name: Flatten asset folder
        run: |
          mkdir -p flat-assets
          find release-assets -type f -exec cp {} flat-assets/ \;
          ls -la flat-assets

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:                  ${{ steps.meta.outputs.tag }}
          name:                 "LastStats v${{ steps.meta.outputs.version }}"
          artifacts:            "flat-assets/*"
          generateReleaseNotes: true
          prerelease:           ${{ steps.meta.outputs.prerelease }}
          makeLatest:           ${{ steps.meta.outputs.prerelease == 'false' }}
          token:                ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## LastStats v${{ steps.meta.outputs.version }}

            ### Android
            | File | Use case |
            |------|----------|
            | `app-universal-release.apk` | Works on any phone (biggest file) |
            | `app-arm64-v8a-release.apk` | Most modern phones (2018+) |
            | `app-armeabi-v7a-release.apk` | Older 32-bit phones |
            | `app-x86_64-release.apk` | Emulators / x86 tablets |

            ### Desktop
            | File | Platform |
            |------|----------|
            | `laststats-windows.zip` | Windows |
            | `laststats-linux.zip`   | Linux |
            | `laststats-macos.zip`   | macOS |

      # NOTE: publishing the update.json / update_beta.json file for the
      # app's auto-update check is handled by a separate workflow:
      # publish-update-metadata.yml — it triggers automatically once this
      # release is published, no action needed here.

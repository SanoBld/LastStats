name: Release LastStats

# Two ways to trigger a real release:
#  1) Push a tag like v2.7.0 (or v2.7.0-beta for a pre-release)
#  2) Run this workflow manually from the Actions tab (workflow_dispatch)
on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release? (beta, rc...)'
        type: boolean
        required: false
        default: false
      version:
        description: 'Version to release (e.g. 2.0.1)'
        required: true

jobs:
  # Resolves tag/version/prerelease BEFORE the builds so it can be passed
  # down to them as an input (each build job does its own checkout, so it
  # can never see a commit made by a later step in this same run).
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag:        ${{ steps.meta.outputs.tag }}
      version:    ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag, version and prerelease flag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}"    >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            if [[ "${{ inputs.version }}" == *"-"* ]] || [ "${{ inputs.prerelease }}" = "true" ]; then
              echo "prerelease=true"  >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
            echo "tag=$TAG"     >> $GITHUB_OUTPUT
            echo "version=$VER" >> $GITHUB_OUTPUT
            if [[ "$TAG" == *"-"* ]]; then
              echo "prerelease=true"  >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.meta.outputs.tag }} || true
          git push origin ${{ steps.meta.outputs.tag }} || true

  # Each platform builds in its own separate workflow file, receiving the
  # resolved version so the compiled app shows/compares against it.
  windows:
    needs: resolve
    uses: ./.github/workflows/build-windows.yml
    with:
      version: ${{ needs.resolve.outputs.version }}

  macos:
    needs: resolve
    uses: ./.github/workflows/build-macos.yml
    with:
      version: ${{ needs.resolve.outputs.version }}

  linux:
    needs: resolve
    uses: ./.github/workflows/build-linux.yml
    with:
      version: ${{ needs.resolve.outputs.version }}

  android:
    needs: resolve
    uses: ./.github/workflows/build-android.yml
    with:
      version: ${{ needs.resolve.outputs.version }}

  # Once all 4 builds are done, gather everything and publish the release.
  publish-release:
    needs: [ resolve, windows, macos, linux, android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      # download-artifact creates one subfolder per artifact name.
      # We flatten everything into one folder so the release page shows
      # a clean flat file list.
      - name: Flatten asset folder
        run: |
          mkdir -p flat-assets
          find release-assets -type f -exec cp {} flat-assets/ \;
          ls -la flat-assets

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:                  ${{ needs.resolve.outputs.tag }}
          name:                 "LastStats v${{ needs.resolve.outputs.version }}"
          artifacts:            "flat-assets/*"
          generateReleaseNotes: true
          prerelease:           ${{ needs.resolve.outputs.prerelease }}
          makeLatest:           ${{ needs.resolve.outputs.prerelease == 'false' }}
          token:                ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## LastStats v${{ needs.resolve.outputs.version }}

            ### Android
            | File | Use case |
            |------|----------|
            | `app-universal-release.apk` | Works on any phone (biggest file) |
            | `app-arm64-v8a-release.apk` | Most modern phones (2018+) |
            | `app-armeabi-v7a-release.apk` | Older 32-bit phones |
            | `app-x86_64-release.apk` | Emulators / x86 tablets |

            ### Desktop
            | File | Platform |
            |------|----------|
            | `laststats-windows.zip` | Windows |
            | `laststats-linux.zip`   | Linux |
            | `laststats-macos.zip`   | macOS |

      # NOTE: publishing the update.json / update_beta.json file for the
      # app's auto-update check is handled by a separate workflow:
      # publish-update-metadata.yml — it triggers automatically once this
      # release is published, no action needed here.

      # If the release is a pre-release (beta)
      - name: Send Discord Beta Notification
        if: needs.resolve.outputs.prerelease == 'true' || needs.resolve.outputs.prerelease == true
        env:
          DISCORD_PRE_RELEASE_WEBHOOK: ${{ secrets.DISCORD_PRE_RELEASE_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "Hey <@&1518721692736688402>! A new pre-release build is available for testing! 🧪\n\n📦 **Version:** ${{ needs.resolve.outputs.tag }}\n📝 **Changelog:** https://github.com/${{ github.repository }}/releases/tag/${{ needs.resolve.outputs.tag }}"
               }' \
               $DISCORD_PRE_RELEASE_WEBHOOK

      # If the release is a stable release
      - name: Send Discord Stable Notification
        if: needs.resolve.outputs.prerelease == 'false' || needs.resolve.outputs.prerelease == false
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "Hey <@&1518721608158679100>! A new update is officially live! 🚀\n\n📦 **Version:** ${{ needs.resolve.outputs.tag }}\n📝 **Changelog:** https://github.com/${{ github.repository }}/releases/tag/${{ needs.resolve.outputs.tag }}"
               }' \
               $DISCORD_WEBHOOK
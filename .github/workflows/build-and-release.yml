name: Build and Release LastStats

# Two ways to trigger a real release:
#  1) Push a tag like v2.7.0 (or v2.7.0-beta for a pre-release)
#  2) Run this workflow manually from the Actions tab (workflow_dispatch)
# Pushing to main/master or opening a PR just builds, without releasing.
on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release? (beta, rc...)'
        type: boolean
        required: false
        default: false
      version:
        description: 'Version to release (e.g. 2.0.1) — leave empty to just build, no release'
        required: false
        default: ''

jobs:
  # ── Windows ────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - name: Build Windows
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          flutter build windows --release --build-name="$VERSION" --build-number=${{ github.run_number }}
      # The /* makes sure the zip contains the files directly,
      # not a wrapping "Release" folder.
      - name: Zip Windows build
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath laststats-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-windows
          path: laststats-windows.zip

  # ── macOS ──────────────────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - name: Build macOS
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          flutter build macos --release --build-name="$VERSION" --build-number=${{ github.run_number }}
      # FIX: we cd into the actual app folder first, so the zip does not
      # contain the long "build/macos/Build/Products/Release/" path inside it.
      - name: Zip macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/laststats-macos.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-macos
          path: laststats-macos.zip

  # ── Linux ──────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - name: Build Linux
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          flutter build linux --release --build-name="$VERSION" --build-number=${{ github.run_number }}
      # FIX: same trick — cd into the bundle folder before zipping.
      - name: Zip Linux build
        run: |
          cd build/linux/x64/release/bundle
          zip -r "$GITHUB_WORKSPACE/laststats-linux.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-linux
          path: laststats-linux.zip

  # ── Android ────────────────────────────────────────────────────────────
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons

      # Universal APK — works on every phone, biggest file size.
      - name: Build universal APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          flutter build apk --release --build-name="$VERSION" --build-number=${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-release.apk app-universal-release.apk

      # Per-CPU-architecture APKs — smaller, faster to install, most people
      # downloading manually want the arm64-v8a one (modern phones).
      - name: Build per-architecture APKs
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          flutter build apk --release --split-per-abi --build-name="$VERSION" --build-number=${{ github.run_number }}

      # Put every APK in one flat folder so the upload step is simple.
      - name: Collect all APKs
        run: |
          mkdir -p android-apks
          cp app-universal-release.apk android-apks/
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk android-apks/
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   android-apks/
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     android-apks/

      - uses: actions/upload-artifact@v4
        with:
          name: laststats-android
          path: android-apks/*

  # ── Release (only runs on a version tag or a manual dispatch with a version) ──
  release:
    needs: [ windows, macos, linux, android ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag, version and prerelease flag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.version }}"    >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            if [[ "${{ inputs.version }}" == *"-"* ]] || [ "${{ inputs.prerelease }}" = "true" ]; then
              echo "prerelease=true"  >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          else
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
            echo "tag=$TAG"     >> $GITHUB_OUTPUT
            echo "version=$VER" >> $GITHUB_OUTPUT
            if [[ "$TAG" == *"-"* ]]; then
              echo "prerelease=true"  >> $GITHUB_OUTPUT
            else
              echo "prerelease=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.meta.outputs.tag }} || true
          git push origin ${{ steps.meta.outputs.tag }} || true

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      # download-artifact creates one subfolder per artifact name.
      # We flatten everything into one folder before attaching to the release,
      # so the release page itself shows a clean flat file list.
      - name: Flatten asset folder
        run: |
          mkdir -p flat-assets
          find release-assets -type f -exec cp {} flat-assets/ \;
          ls -la flat-assets

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:                  ${{ steps.meta.outputs.tag }}
          name:                 "LastStats v${{ steps.meta.outputs.version }}"
          artifacts:            "flat-assets/*"
          generateReleaseNotes: true
          prerelease:           ${{ steps.meta.outputs.prerelease }}
          makeLatest:           ${{ steps.meta.outputs.prerelease == 'false' }}
          token:                ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## LastStats v${{ steps.meta.outputs.version }}

            ### Android
            | File | Use case |
            |------|----------|
            | `app-universal-release.apk` | Works on any phone (biggest file) |
            | `app-arm64-v8a-release.apk` | Most modern phones (2018+) |
            | `app-armeabi-v7a-release.apk` | Older 32-bit phones |
            | `app-x86_64-release.apk` | Emulators / x86 tablets |

            ### Desktop
            | File | Platform |
            |------|----------|
            | `laststats-windows.zip` | Windows |
            | `laststats-linux.zip`   | Linux |
            | `laststats-macos.zip`   | macOS |

      # ── Update metadata for the in-app update checker ──────────────────
      - name: Pick metadata filename
        id: file
        run: |
          if [ "${{ steps.meta.outputs.prerelease }}" = "true" ]; then
            echo "filename=update_beta.json" >> "$GITHUB_OUTPUT"
          else
            echo "filename=update.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Write the metadata JSON file
        run: |
          mkdir -p public
          TAG="${{ steps.meta.outputs.tag }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/$REPO/releases/download/$TAG"
          cat > public/${{ steps.file.outputs.filename }} << EOF
          {
            "tag": "$TAG",
            "version": "${{ steps.meta.outputs.version }}",
            "apk_url": "$BASE/app-universal-release.apk",
            "apk_arm64_url": "$BASE/app-arm64-v8a-release.apk",
            "apk_armeabi_url": "$BASE/app-armeabi-v7a-release.apk",
            "apk_x86_64_url": "$BASE/app-x86_64-release.apk",
            "release_url": "https://github.com/$REPO/releases/tag/$TAG",
            "notes": "See the release page for the full changelog.",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "prerelease": ${{ steps.meta.outputs.prerelease }}
          }
          EOF

      - name: Publish metadata to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
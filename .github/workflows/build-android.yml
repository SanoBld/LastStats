name: Build Android

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (e.g. 2.7.0). Empty = read from pubspec.yaml'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.7.0). Empty = read from pubspec.yaml'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons

      - name: Resolve version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Inject version into app
        run: sed -i "s/currentVersion = '.*'/currentVersion = '$VERSION'/" lib/services/update_service.dart

      # Universal APK — works on every phone, biggest file size.
      - name: Build universal APK
        run: |
          flutter build apk --release --build-name="$VERSION" --build-number=${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-release.apk app-universal-release.apk

      # Per-CPU-architecture APKs — smaller, faster to install.
      - name: Build per-architecture APKs
        run: flutter build apk --release --split-per-abi --build-name="$VERSION" --build-number=${{ github.run_number }}

      # Put every APK in one flat folder so the upload step is simple.
      - name: Collect all APKs
        run: |
          mkdir -p android-apks
          cp app-universal-release.apk android-apks/
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk android-apks/
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   android-apks/
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     android-apks/

      - uses: actions/upload-artifact@v4
        with:
          name: laststats-android
          path: android-apks/*
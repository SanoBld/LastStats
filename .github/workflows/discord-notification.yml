name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # If the release is a pre-release (beta)
      - name: Send beta notification
        if: github.event.release.prerelease == true
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "Hey <@&1518721692736688402>! A new pre-release build is available for testing! 🧪\n\n📦 **Version:** ${{ github.event.release.tag_name }}\n📝 **Changelog:** ${{ github.event.release.html_url }}"
               }' \
               ${{ secrets.DISCORD_PRE_RELEASE_WEBHOOK }}

      # If the release is a stable release
      - name: Send stable notification
        if: github.event.release.prerelease == false
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "Hey <@&1518721608158679100>! A new update is officially live! 🚀\n\n📦 **Version:** ${{ github.event.release.tag_name }}\n📝 **Changelog:** ${{ github.event.release.html_url }}"
               }' \
               ${{ secrets.DISCORD_WEBHOOK }}
name: Build Windows

# Reusable: called by build-all.yml / release.yml — also runnable manually.
# If "version" is provided (release.yml), it's used and injected into the
# app. Otherwise (build-all.yml's automatic checks), falls back to pubspec.yaml.
on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (e.g. 2.7.0). Empty = read from pubspec.yaml'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.7.0). Empty = read from pubspec.yaml'
        required: false
        type: string
        default: ''

jobs:
  build-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons

      - name: Resolve version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build Windows (x64)
        shell: bash
        run: flutter build windows --release --build-name="$VERSION" --build-number=${{ github.run_number }}

      # The /* makes sure the zip contains the files directly,
      # not a wrapping "Release" folder.
      - name: Zip Windows x64 build
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath laststats-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-windows
          path: laststats-windows.zip

      # Proper installer: puts files in Program Files, adds Start Menu +
      # optional Desktop shortcut with the app icon, and an uninstaller.
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build installer (x64)
        shell: pwsh
        env:
          APP_VERSION: ${{ env.VERSION }}
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss /DMyArch=x64'
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-windows-installer
          path: windows\installer_output\LastStats-Setup-x64.exe

  # Windows on ARM (Snapdragon-powered devices, e.g. Surface Pro X / Surface
  # Laptop 7 ARM). Unlike Android, Flutter has no "--target-platform" flag to
  # cross-compile Windows ARM64 from an x64 host — it must be built natively
  # on an ARM64 Windows machine. GitHub provides a hosted ARM64 Windows
  # runner ("windows-11-arm", currently in public preview) for exactly this.
  #
  # NOTE: if this job fails with "no runner matching 'windows-11-arm'", it
  # means that runner label isn't enabled for this repo/plan yet — remove
  # this job (or ask GitHub support to enable it) until it is.
  build-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      # subosito/flutter-action can't resolve a "stable" SDK build for the
      # arm64 architecture on this runner ("Unable to determine Flutter
      # version for ... architecture: arm64"). Installing directly from
      # Flutter's own git repo sidesteps that lookup entirely and is the
      # method Flutter itself recommends for less common host architectures.
      - name: Install Flutter (arm64)
        shell: pwsh
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$env:USERPROFILE\flutter"
          echo "$env:USERPROFILE\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - run: flutter doctor -v
      - run: flutter pub get
      - run: dart run flutter_launcher_icons

      - name: Resolve version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build Windows (ARM64)
        shell: bash
        run: flutter build windows --release --build-name="$VERSION" --build-number=${{ github.run_number }}

      - name: Zip Windows ARM64 build
        shell: pwsh
        run: Compress-Archive -Path build/windows/arm64/runner/Release/* -DestinationPath laststats-windows-arm64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-windows-arm64
          path: laststats-windows-arm64.zip

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build installer (ARM64)
        shell: pwsh
        env:
          APP_VERSION: ${{ env.VERSION }}
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss /DMyArch=arm64'
      - uses: actions/upload-artifact@v4
        with:
          name: laststats-windows-arm64-installer
          path: windows\installer_output\LastStats-Setup-arm64.exe

name: Deploy LastStats

on:
  push:
    branches:
      - main # Déclenche l'action à chaque push sur la branche main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Requis pour déployer sur gh-pages

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Injecter le hash du commit dans le Service Worker
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          VERSION="v10-${COMMIT_HASH}"

          python3 - "$VERSION" <<'PYEOF'
          import sys, re

          version = sys.argv[1]

          with open('sw.js', 'r', encoding='utf-8') as f:
              content = f.read()
          content = re.sub(r"const CACHE_VERSION = '[^']*'", f"const CACHE_VERSION = '{version}'", content)
          with open('sw.js', 'w', encoding='utf-8') as f:
              f.write(content)

          print(f"sw.js OK -> CACHE_VERSION = '{version}'")
          PYEOF

          echo "--- Verification sw.js ---"
          head -2 sw.js

      - name: Déploiement sur GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
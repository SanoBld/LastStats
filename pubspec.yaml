name: laststats_mobile
description: "LastStats — Your Last.fm stats, reinvented."
publish_to: 'none'

version: 2.6.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  dynamic_color: ^1.8.1
  shared_preferences: ^2.2.3
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  url_launcher: ^6.3.0
  palette_generator: ^0.3.3
  flutter_local_notifications: ^19.4.2
  workmanager: ^0.6.0
  window_manager: ^0.4.3
  web: ^1.1.0
  audioplayers: ^6.1.0
  flutter_svg: ^2.0.10
  file_picker: ^8.1.2
  package_info_plus: ^8.1.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# ── App icon ───────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon-512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1558D6"
  adaptive_icon_foreground: "assets/images/icon-512.png"
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/images/icon-512.png"
    icon_size: 48
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/

  fonts:
    # ── Nothing OS fonts ───────────────────────────────────────────────────
    - family: Ndot57
      fonts:
        - asset: assets/fonts/Ndot57-Regular.otf

    - family: Ndot57Caps
      fonts:
        - asset: assets/fonts/Ndot57Caps-Regular.otf

    - family: Ndot55
      fonts:
        - asset: assets/fonts/Ndot55-Regular.otf

    - family: Ndot55Caps
      fonts:
        - asset: assets/fonts/Ndot55Caps-Regular.otf

    - family: Ndot77
      fonts:
        - asset: assets/fonts/Ndot77JPExtended.ttf

    - family: NType82
      fonts:
        - asset: assets/fonts/NType82-Regular.otf
        - asset: assets/fonts/NType82-Headline.otf
          weight: 700

    - family: NType82Mono
      fonts:
        - asset: assets/fonts/NType82Mono-Regular.otf

    - family: LetteraMonoLL
      fonts:
        - asset: assets/fonts/LetteraMonoLL-Regular.otf
        - asset: assets/fonts/LetteraMonoLL-Light.otf
          weight: 300
        - asset: assets/fonts/LetteraMonoLL-Medium.otf
          weight: 500
        - asset: assets/fonts/LetteraMonoLL-Italic.otf
          style: italic
        - asset: assets/fonts/LetteraMonoLL-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/LetteraMonoLL-MediumItalic.otf
          weight: 500
          style: italic

    # ── Utility fonts ──────────────────────────────────────────────────────
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Light.otf
          weight: 300
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/InterVariable-Italic.ttf
          style: italic

    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.otf

    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.otf
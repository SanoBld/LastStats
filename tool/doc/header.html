<style>
  :root {
    --ls-accent:  #d51007; /* Last.fm crimson — LastStats accent */
    --ls-bg:      #121212; /* Material You dark surface */
    --ls-surface: #1e1e1e;
    --ls-border:  #2c2c2c;
  }

  body {
    font-family: 'Google Sans', 'Roboto', system-ui, sans-serif !important;
    background-color: var(--ls-bg) !important;
  }

  /* Top bar + sidebar */
  header.title, .navbar, .sidebar-offcanvas-left, .sidebar-offcanvas-right {
    background-color: var(--ls-bg) !important;
    border-color: var(--ls-border) !important;
  }
  .self-name { color: var(--ls-accent) !important; font-weight: 700 !important; }

  /* Links + active sidebar entry */
  a { color: var(--ls-accent) !important; }
  .sidebar a.selected, .sidebar li.selected > a {
    background: rgba(213, 16, 7, 0.14) !important;
    border-left: 3px solid var(--ls-accent) !important;
  }

  /* Cards, code blocks: rounded Material 3 look */
  pre, .source-code, dl.dl-horizontal, .feature-set {
    background: var(--ls-surface) !important;
    border: 1px solid var(--ls-border) !important;
    border-radius: 12px !important;
  }

  /* Pills (e.g. "static", "final" badges) */
  .feature {
    border-radius: 999px !important;
    background: var(--ls-surface) !important;
  }

  /* Search box */
  #search-box, .search-input {
    border-radius: 999px !important;
    background: var(--ls-surface) !important;
  }
</style>
